services:
  backend:
    image: qa_hub_backend:latest
    container_name: "qa_hub_backend"
    restart: always
    build:
      context: ./qa_hub_backend
    ports:
      - '8080:8080'
    env_file:
      - .config/.env
    networks: # Networks to join (Services on the same network can communicate with each other using their name)
      - qa_hub_network
    volumes:
      - qa_hub_backend:/usr/src/app/qa_hub_backend
      - type: bind
        source: /QA_Hub/Attachments
        target: /QA_Hub/Attachments
        read_only: false
        bind:
          create_host_path: true

  frontend:
    image: qa_hub_frontend:latest
    container_name: "qa_hub_frontend"
    restart: always
    build:
      context: ./qa_hub_frontend
    ports:
      - '3000:3000'
    env_file:
      - .config/.env
    networks: # Networks to join (Services on the same network can communicate with each other using their name)
      - qa_hub_network
    volumes:
      - qa_hub_frontend:/usr/src/app/qa_hub_frontend

volumes:
  qa_hub_backend:
  qa_hub_frontend:

networks:
  qa_hub_network: